<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56">
  <defs>
    <style>
      .k-bold { font-family: 'Montserrat', 'Arial Black', Arial, sans-serif; font-weight:900; fill: #007CB0; }
      .k-sub  { font-family: 'Montserrat', Arial, sans-serif; font-weight: 500; fill: #363636; }
      .k-bar  { fill: #007CB0; }
    </style>
  </defs>
  <!-- Vertical accent bar -->
  <rect class="k-bar" x="0" y="8" width="5" height="40" rx="2"/>
  <!-- "KIMS" in primary blue, bold -->
  <text class="k-bold" x="14" y="34" font-size="26" letter-spacing="2">KIMS</text>
  <!-- "HOSPITALS" below in dark gray -->
  <text class="k-sub" x="14" y="48" font-size="11" letter-spacing="3.5">HOSPITALS</text>
</svg>
